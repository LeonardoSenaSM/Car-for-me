<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarForMe - Gestão de Veículos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .bg-gradient-dark {
        background: linear-gradient(135deg, #111827 0%, #1f2937 100%);
    }
  </style>
</head>
<body class="bg-gray-900 text-gray-200 font-sans antialiased min-h-screen flex flex-col">

<nav class="bg-gray-800 border-b border-gray-700">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <div class="flex items-center">
        <a th:href="@{/CarForMe/ui}" class="font-bold text-2xl text-white tracking-wider flex items-center hover:opacity-80 transition-opacity">
          CAR
          <span class="bg-blue-600 text-white px-2 py-0.5 rounded-md mx-2 text-xl shadow-sm">4</span>
          ME
        </a>
      </div>
      <div class="hidden md:block">
        <div class="ml-10 flex items-baseline space-x-4">
          <a th:href="@{/CarForMe/ui}" class="bg-gray-900 text-white px-3 py-2 rounded-md text-sm font-medium">Início</a>
          <a th:href="@{/CarForMe/ui/catalog}" class="text-gray-300 hover:text-white hover:bg-gray-700 px-3 py-2 rounded-md text-sm font-medium transition-colors">Catálogo</a>
          <a th:href="@{/CarForMe/ui/register}" class="bg-gray-700 text-white hover:bg-gray-600 px-4 py-2 rounded-md text-sm font-medium transition-colors">Cadastrar Veículo</a>
        </div>
      </div>
    </div>
  </div>
</nav>

<main class="flex-grow bg-gradient-dark flex items-center">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-24 text-center lg:text-left flex flex-col lg:flex-row items-center">

    <div class="lg:w-1/2 lg:pr-8">
      <h1 class="text-4xl tracking-tight font-extrabold text-white sm:text-5xl md:text-6xl">
        <span class="block">O controle absoluto da</span>
        <span class="block text-gray-400">sua garagem premium.</span>
      </h1>
      <p class="mt-3 max-w-md mx-auto text-base text-gray-400 sm:text-lg md:mt-5 md:text-xl lg:mx-0">
        Gerencie, cadastre e visualize seu portfólio de veículos com uma plataforma desenvolvida para máxima eficiência e elegância.
      </p>
      <div class="mt-10 sm:flex sm:justify-center lg:justify-start space-x-4">
        <a th:href="@{/CarForMe/ui/register}" class="inline-flex items-center justify-center px-8 py-3 border border-transparent text-base font-medium rounded-md text-gray-900 bg-gray-200 hover:bg-white transition-colors md:py-4 md:text-lg">
          Adicionar Veículo
        </a>
        <a th:href="@{/CarForMe/ui/catalog}" class="inline-flex items-center justify-center px-8 py-3 border border-gray-600 text-base font-medium rounded-md text-gray-300 bg-transparent hover:bg-gray-800 hover:text-white transition-colors md:py-4 md:text-lg">
          Ver Catálogo
        </a>
      </div>
    </div>

    <div class="mt-12 lg:mt-0 lg:w-1/2 relative hidden lg:block">
      <div class="rounded-xl shadow-2xl overflow-hidden border border-gray-700">
        <img src="https://images.unsplash.com/photo-1605810230434-7631ac76ec81?auto=format&fit=crop&w=800&q=80" alt="Super Car" class="w-full h-auto object-cover opacity-80 hover:opacity-100 transition-opacity duration-500">
      </div>
      <div class="absolute -bottom-4 -left-4 w-24 h-24 bg-gray-600 rounded-full mix-blend-multiply filter blur-xl opacity-50 animate-pulse"></div>
    </div>

  </div>
</main>

<footer class="bg-gray-900 border-t border-gray-800 py-8">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-gray-500 text-sm">
    &copy; 2026 CarForMe. Todos os direitos reservados.
  </div>
</footer>

</body>
</html>
